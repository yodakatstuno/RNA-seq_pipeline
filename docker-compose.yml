services:
  pipeline:
    #build:
    #  context: .
    #  dockerfile: Dockerfile
    image: ghcr.io/yodakatstuno/rnaseq-pipeline:v1.2.8
    working_dir: /app
    environment:
      R_LIBS_USER: /app/.r_libs
      PIPELINE_OUTPUT_DIR: /app/Output
    user: "${UID:-0}:${GID:-0}"
    volumes:
      - ./:/app
      - ./data:/data
      - ${HOME}/Output:/app/Output
    tty: true
    stdin_open: true
